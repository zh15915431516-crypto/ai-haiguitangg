<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI海龟汤 - 神秘推理游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 50%, #0d1235 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰效果 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(100, 100, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(100, 200, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(150, 100, 255, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        /* 星空效果 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 85%;
            transform: scale(0.85);
            transform-origin: center center;
        }

        /* 游戏标题 */
        .title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #64b5f6 0%, #90caf9 30%, #bbdefb 50%, #90caf9 70%, #64b5f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(100, 181, 246, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 20px rgba(100, 181, 246, 0.6)); }
            to { filter: drop-shadow(0 0 40px rgba(100, 181, 246, 0.9)); }
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 50px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* 规则卡片 */
        .rules-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 50px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .rules-title {
            font-size: 1.2rem;
            color: #90caf9;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .rules-title::before,
        .rules-title::after {
            content: '✦';
            font-size: 0.7rem;
            color: rgba(144, 202, 249, 0.6);
        }

        /* 规则网格布局 - 2列 */
        .rules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .rule-item {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.08) 0%, rgba(100, 181, 246, 0.03) 100%);
            border: 1px solid rgba(100, 181, 246, 0.15);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .rule-item:hover {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.12) 0%, rgba(100, 181, 246, 0.05) 100%);
            border-color: rgba(100, 181, 246, 0.25);
            transform: translateY(-3px);
        }

        .rule-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2) 0%, rgba(33, 150, 243, 0.2) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.15);
        }

        .rule-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .rule-highlight {
            color: #90caf9;
            font-weight: 500;
        }

        /* 开始游戏按钮 */
        .start-btn {
            position: relative;
            padding: 18px 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0a0e27;
            background: linear-gradient(135deg, #64b5f6 0%, #42a5f5 50%, #2196f3 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 15px rgba(33, 150, 243, 0.4),
                0 0 30px rgba(33, 150, 243, 0.2);
            letter-spacing: 2px;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: left 0.5s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 8px 25px rgba(33, 150, 243, 0.6),
                0 0 50px rgba(33, 150, 243, 0.4);
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* 装饰性元素 */
        .decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(100, 181, 246, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .decoration-1 {
            top: 10%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
        }

        .decoration-2 {
            bottom: 10%;
            right: 10%;
            width: 150px;
            height: 150px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 响应式优化 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }

            .rules-card {
                padding: 20px;
            }

            .start-btn {
                padding: 16px 45px;
                font-size: 1.1rem;
            }

            .rules-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .rule-item {
                padding: 12px;
            }
            
            .rule-icon {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }
            
            .rule-text {
                font-size: 0.9rem;
            }
            
            .rules-card {
                padding: 18px 14px;
            }
        }

        /* 提示信息 */
        .hint {
            margin-top: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>

    <!-- 主内容 -->
    <div class="container">
        <h1 class="title">AI海龟汤</h1>
        <p class="subtitle">Mystery Soup Game</p>
        
        <div class="rules-card">
            <h2 class="rules-title">游戏规则</h2>
            <div class="rules-grid">
                <div class="rule-item">
                    <div class="rule-icon">📖</div>
                    <div class="rule-text">阅读AI给出的<span class="rule-highlight">离奇故事</span>开头</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">❓</div>
                    <div class="rule-text">提出<span class="rule-highlight">是/否问题</span>，AI只回答是/否/无关</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">🔍</div>
                    <div class="rule-text">推理出故事背后的<span class="rule-highlight">真相</span></div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">🏆</div>
                    <div class="rule-text">揭开<span class="rule-highlight">谜底</span>，完成挑战！</div>
                </div>
            </div>
        </div>
        
        <button class="start-btn" onclick="startGame()">开始游戏</button>
        
        <p class="hint">准备好挑战你的推理能力了吗？</p>
    </div>

    <script>
        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 50;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                starsContainer.appendChild(star);
            }
        }

        // 开始游戏
        function startGame() {
            // 添加按钮点击动画效果
            const btn = document.querySelector('.start-btn');
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                btn.style.transform = '';
                alert('游戏即将开始！\n\n（这里可以跳转到游戏主界面）');
                // 实际项目中可以跳转到游戏页面
                // window.location.href = '/game';
            }, 150);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
        });
    </script>
</body>
</html>
